<!-- templates/main.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar {
            background-color: #f8f9fa;
        }
        .btn-logout {
            color: #fff;
            background-color: #dc3545;
            border: none;
        }
        .btn-logout:hover {
            background-color: #c82333;
        }
        #webcam {
            width: 100%;
            max-width: 640px;
        }
    </style>
</head>
<body class="bg-light">
    <!-- Navigation bar with Logout button -->
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Welcome, {{ user.first_name }}!</span>
            <div class="ml-auto">
                <a href="{{ url_for('auth.logout') }}" class="btn btn-logout btn-sm">Log Out</a>
                <!-- Updated logout URL to include blueprint name -->
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <div class="card">
                    <div class="card-body">
                        <h5>Webcam Feed</h5>
                        <video id="webcam" autoplay playsinline></video>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        // Access user's webcam
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(function(stream) {
                const video = document.getElementById('webcam');
                video.srcObject = stream;
            })
            .catch(function(error) {
                console.error('Error accessing the webcam: ', error);
            });

        {% with messages = get_flashed_messages(with_categories=false) %}
          {% if messages %}
            const toastContainer = document.getElementById('toastContainer');
            {% for message in messages %}
              const toastHTML = `
                <div class="toast" role="alert" aria-live="assertive" aria-atomic="true" data-delay="5000">
                  <div class="toast-body">{{ message }}</div>
                </div>`;
              toastContainer.innerHTML += toastHTML;
            {% endfor %}
            const toasts = document.querySelectorAll('.toast');
            toasts.forEach(toast => $(toast).toast('show'));
          {% endif %}
        {% endwith %}
    </script>
</body>
</html>
